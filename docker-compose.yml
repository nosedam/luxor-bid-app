services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: luxor
      POSTGRES_PASSWORD: luxor
      POSTGRES_DB: luxor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxor -d luxor"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - apps/web/.env
    environment:
      # Overrides the localhost URL from .env with the Docker service hostname
      DATABASE_URL: postgresql://luxor:luxor@postgres:5432/luxor
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
